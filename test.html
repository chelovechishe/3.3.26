<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width:100px;
            height:100px;
            background: white;
            pointer-events: none;
            cursor: default;
        }
        .closed_card{
            width:100px;
            height:100px;
            background: white;
            background-image: url("card.png");
            background-size: 100px 100px;
        }
        .heart{
            width:100px;
            height:100px;
            background: white;
            background-size: 100px 100px;
        }
        .circle{
            width:100px;
            height:100px;
            background: white;
            background-size: 100px 100px;
        }
        .triangle{
            width:100px;
            height:100px;
            background: white;
            background-size: 100px 100px;
        }
        .star{
            width:100px;
            height:100px;
            background: white;
            background-size: 100px 100px;
        }
        .block{
            width:100px;
            height:100px;
            background: white;
            background-size: 100px 100px;
        }
        .matched {
            opacity: 0.5;
        }
    </style>
</head>
<body style="background: wheat; min-width: 450px;">
    <header>
        <div>
            <div><p>
                Game "Memory"
            </p></div>
            <div>
            <button onclick="start()" style="width: 60px; height: 30px; left: 150px;" id="startBtn">
                Start
            </button>
            <div>
                <p id="TTimer">30</p>
            </div>
            <div>
                <p>1 = 10 cards</p>
                <input type="number" name="" id="fieldSize" value="1" min="1" max="10">
                <button id="changeButton" onclick="ChangeField()">
                    Change field
                </button>
            </div>
            </div>
        </div>
    </header>
    <main>
        <div id="bigContainer">
            <div class="container">
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
            </div>
            <div class="container">
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
                <button>
                    <img alt="" class="card">
                </button>
            </div>
        </div>
    </main>
    
    <script src="jquery-4.0.0.js"></script>
    <script>
        let cards = [];
        let cardsImages = [];
        let openedCards = [];
        let matchedPairs = 0;
        let canOpen = true;
        let timeoutId = null;
        let gameFinished = false;
        timer = 30;
        field_size=1

        function ChangeField(){
            console.log($("#fieldSize").val())
            console.log($("#fieldSize").val()>=10)
            
            field_size= $("#fieldSize").val();
            
            console.log(field_size>=10)
            console.log(field_size.type)
            console.log(field_size)
            if(field_size<0)
            {
                $("#fieldSize").val(1)
                field_size=1
            }
            else if(field_size>10)
            {
                $("#fieldSize").val(10)
                field_size=10
            }
            $("#bigContainer").empty();
            // element = $(".container").clone()
            // element.addClass("cloned");
            for(i=0;i<field_size*2;i++)
            {
                $("#bigContainer").append('<div class="container"> <button><img alt="" class="card"></button><button><img alt="" class="card"></button><button><img alt="" class="card"></button><button><img alt="" class="card"></button><button><img alt="" class="card"></button></div>')
            }
        }

        function timerMove(){setTimeout(function(){
            if(matchedPairs==field_size*5||gameFinished)
            {
                return
            }else if(timer>0){
                timer-=1
                TTimer.innerText=timer
                timerMove()
            }
            else{
                alert("Oh,No! You lose!");
                Finish()
                resetGame();
                document.getElementById('startBtn').disabled = false;
            }
        },1000)}

        function start() {
            if (gameFinished) return;
                timerMove()
            resetGame();
            
            timer = field_size * 15

            document.getElementById("changeButton").disabled=true

            cards = $('.card');
            console.log("Всего карточек: " + cards.length);
            
            cardsImages = ["circle","circle","triangle","triangle","star","star","block","block","heart","heart"];
            
            console.log("Перемешанные карточки: " + cardsImages);
            for(i=0;i<field_size;i++)
            {
                cardsImages = cardsImages.sort(() => Math.random() - 0.5);
                for(j=10*i;j<10+10*i;j++)
                {
                    $(cards[j]).removeClass().addClass('closed_card');
                    $(cards[j]).addClass(cardsImages[j-10*i]);
                    $(cards[j]).css('background-image', 'url("card.png")');
                }
            }
            // for(let i = 0; i < cards.length; i++) {
            //     $(cards[i]).removeClass().addClass('closed_card');
            //     $(cards[i]).addClass(cardsImages[i]);
            //     $(cards[i]).css('background-image', 'url("card.png")');
            // }
            document.getElementById('startBtn').innerText = "Finish";
            document.getElementById('startBtn').onclick = Finish;
            
            activateCardClick();
        }

        function activateCardClick() {
            $('button').off('click').on('click', function(event) {
                if ($(this).attr('id') === 'startBtn') return;
                
                let img = $(this).find('img');
            
                if (!canOpen || openedCards.length >= 2 || !img.hasClass('closed_card') || img.hasClass('matched') || gameFinished) {
                    return;
                }
                openCard(img);
            });
        }

        function openCard(card) {
            // Получаем класс изображения
            let classes = card.attr('class').split(' ');
            let imageClass = '';
            
            if (classes.includes('heart')) imageClass = 'heart';
            else if (classes.includes('circle')) imageClass = 'circle';
            else if (classes.includes('triangle')) imageClass = 'triangle';
            else if (classes.includes('star')) imageClass = 'star';
            else if (classes.includes('block')) imageClass = 'block';
            
            if (!imageClass) return;
            
            // Устанавливаем фоновое изображение в зависимости от класса
            card.css('background-image', 'url("' + imageClass + '.png")');
            
            // Меняем класс closed_card на card (открываем карточку)
            card.removeClass('closed_card').addClass('card');
            
            // Добавляем в открытые карточки
            openedCards.push({
                element: card,
                type: imageClass
            });
            
            console.log("Открыта карточка: " + imageClass);
            
            // Проверяем нужно ли сравнивать
            if (openedCards.length === 2) {
                compareCards();
            }
        }

        function compareCards() {
            if (openedCards.length !== 2) return;
            
            canOpen = false;
            
            let card1 = openedCards[0];
            let card2 = openedCards[1];
            
            console.log("Сравниваем: " + card1.type + " и " + card2.type);
            
            if (card1.type === card2.type) {
                // Карточки совпали
                console.log("Совпадение!");
                
                // Делаем их прозрачными
                setTimeout(function() {
                    card1.element.addClass('matched');
                    card2.element.addClass('matched');
                    timer += field_size
                    matchedPairs++;
                    openedCards = [];
                    canOpen = true;
                    
                    // Проверяем не закончилась ли игра
                    if (matchedPairs === field_size * 5) {
                        
                        document.getElementById("changeButton").disabled=false
                        document.getElementById('startBtn').innerText = "Start";
                        document.getElementById('startBtn').onclick = start;
                        setTimeout(function() {
                            alert("Поздравляем! Вы выиграли!");
                        }, 100);
                    }
                }, 300);
            } else {
                // Карточки не совпали
                console.log("Не совпали");
                
                // Закрываем через 2 секунды
                timeoutId = setTimeout(function() {
                    // Убираем фоновое изображение
                    card1.element.css('background-image', 'url("card.png")');
                    card2.element.css('background-image', 'url("card.png")');
                    
                    card1.element.removeClass('card').addClass('closed_card');
                    card2.element.removeClass('card').addClass('closed_card');
                    
                    openedCards = [];
                    canOpen = true;
                    timeoutId = null;
                }, 2000);
            }
        }

        function Finish() {
            for(let i = 0; i < cards.length; i++) {
                $(cards[i]).removeClass('closed_card').addClass('card');
                card = $(cards[i]).find('img')
                // $(cards[i]).css('background-image', '');
                if (cards[i].classList.contains('heart')) 
                {
                    console.log("1")
                    cards[i].style.backgroundImage =  'url("heart.png")';
                }  
                else if (cards[i].classList.contains('circle')) cards[i].style.backgroundImage =  'url("circle.png")';
                else if (cards[i].classList.contains('triangle')) cards[i].style.backgroundImage =  'url("triangle.png")';
                else if (cards[i].classList.contains('star')) cards[i].style.backgroundImage =  'url("star.png")';
                else if (cards[i].classList.contains('block')) cards[i].style.backgroundImage =  'url("block.png")';
            }
            resetGame();
            
            gameFinished = true;
            
            document.getElementById('startBtn').disabled = true;
            
            $('button').off('click');
        }

        function resetGame() {
            openedCards = [];
            matchedPairs = 0;
            canOpen = true;
            timer = 30;
            document.getElementById("changeButton").disabled=false
            document.getElementById('startBtn').innerText = "Start";
            document.getElementById('startBtn').onclick = start;
        }
    </script>
</body>
</html>
